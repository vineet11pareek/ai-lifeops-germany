version: "3.9"

services:
  user-service:
    build:
      context: ../../backend/user-service
      dockerfile: Dockerfile
    container_name: lifeops-user-service
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/lifeops_db
      SPRING_DATASOURCE_USERNAME: lifeops
      SPRING_DATASOURCE_PASSWORD: lifeops_password
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lifeops-network
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health | grep UP || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  api-gateway:
    build:
      context: ../../backend/api-gateway
      dockerfile: Dockerfile
    container_name: lifeops-api-gateway
    restart: unless-stopped
    environment:
      USER_SERVICE_URL: http://user-service:8081
      AI_SERVICE_URL: http://ai-service:8082
      DOCUMENT_SERVICE_URL: http://document-service:8083
    ports:
      - "8080:8080"
    depends_on:
      user-service:
        condition: service_healthy
      ai-service:
        condition: service_healthy
      document-service:
        condition: service_healthy
    networks:
      - lifeops-network
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep UP || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  ai-service:
    build:
      context: ../../backend/ai-service
      dockerfile: Dockerfile
    container_name: lifeops-ai-service
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/lifeops_db
      SPRING_DATASOURCE_USERNAME: lifeops
      SPRING_DATASOURCE_PASSWORD: lifeops_password
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - lifeops-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8082/actuator/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  document-service:
    build:
      context: ../../backend/document-service
      dockerfile: Dockerfile
    container_name: lifeops-document-service
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/lifeops_db
      SPRING_DATASOURCE_USERNAME: lifeops
      SPRING_DATASOURCE_PASSWORD: lifeops_password
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lifeops-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8083/actuator/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  frontend:
    build:
      context: ../../frontend/lifeops-ui
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    container_name: lifeops-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - lifeops-network

  postgres:
    image: postgres:16
    container_name: lifeops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lifeops
      POSTGRES_PASSWORD: lifeops_password
      POSTGRES_DB: lifeops_db
    ports:
      - "5432:5432"
    volumes:
      - lifeops_postgres_data:/var/lib/postgresql/data
    networks:
      - lifeops-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifeops -d lifeops_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: lifeops-pgadmin
    restart: unless-stopped
    profiles:
      - tools
    environment:
      PGADMIN_DEFAULT_EMAIL: vineet00pareek.de@gmail.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lifeops-network

  kafka:
    image: apache/kafka:3.9.0  # MUST be exactly this
    container_name: lifeops-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      # KRaft configuration (NO zookeeper)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://:9092,EXTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    networks:
      - lifeops-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10

volumes:
  lifeops_postgres_data:

networks:
  lifeops-network:
    driver: bridge