version: "3.9"

services:
  user-service:
    build:
      context: ../../backend/user-service
      dockerfile: Dockerfile
    container_name: lifeops-user-service
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/lifeops_db
      SPRING_DATASOURCE_USERNAME: lifeops
      SPRING_DATASOURCE_PASSWORD: lifeops_password
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lifeops-network
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health | grep UP || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  api-gateway:
    build:
      context: ../../backend/api-gateway
      dockerfile: Dockerfile
    container_name: lifeops-api-gateway
    restart: unless-stopped
    environment:
      USER_SERVICE_URL: http://user-service:8081
    ports:
      - "8080:8080"
    depends_on:
      user-service:
        condition: service_healthy
    networks:
      - lifeops-network
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep UP || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  frontend:
    build:
      context: ../../frontend/lifeops-ui
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    container_name: lifeops-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - lifeops-network

  postgres:
    image: postgres:16
    container_name: lifeops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lifeops
      POSTGRES_PASSWORD: lifeops_password
      POSTGRES_DB: lifeops_db
    ports:
      - "5432:5432"
    volumes:
      - lifeops_postgres_data:/var/lib/postgresql/data
    networks:
      - lifeops-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifeops -d lifeops_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: lifeops-pgadmin
    restart: unless-stopped
    profiles:
      - tools
    environment:
      PGADMIN_DEFAULT_EMAIL: vineet00pareek.de@gmail.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lifeops-network

  kafka:
    image: bitnamilegacy/kafka:latest
    container_name: lifeops-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
      ALLOW_PLAINTEXT_LISTENER: "yes"
    networks:
      - lifeops-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: lifeops-kafka-ui
    restart: unless-stopped
    profiles:
      - tools
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: lifeops-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - lifeops-network

volumes:
  lifeops_postgres_data:

networks:
  lifeops-network:
    driver: bridge