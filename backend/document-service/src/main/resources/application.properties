spring.application.name=document-service
server.port=8083

# Downstream Services
lifeops.services.ai-service-url=${AI_SERVICE_URL:http://localhost:8082}

# PostgresSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/lifeops_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:lifeops}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:lifeops_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.table=flyway_schema_history_document_service
spring.flyway.baseline-on-migrate=true

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.db.enabled=true

# OpenAPI / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# Logging
logging.pattern.level=%5p [correlationId=%X{correlationId}]

# Kafka
spring.kafka.bootstrap-servers= ${SPRING_KAFKA_BOOTSTRAP_SERVER:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer= org.springframework.kafka.support.serializer.JsonSerializer

# LifeOps kafka topics
lifeops.kafka.topics.document-analyzed= document.analyzed