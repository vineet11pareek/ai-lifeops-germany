spring:
  application:
    name: user-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/lifeops_db}
    username: ${SPRING_DATASOURCE_USERNAME:lifeops}
    password: ${SPRING_DATASOURCE_PASSWORD:lifeops_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

info:
  app:
    name: user-service

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info

  endpoint:
    health:
      show-details: always
      show-components: always

  health:
    db:
      enabled: true
# Logging
logging:
  pattern:
    level: "%5p [correlationId=%X{correlationId}]"

debug: true

# OpenAPI/Swagger
springdoc:
  api-docs:
    path: /v3/api-docs

  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

# Google OAuth
lifeops:
  security:
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
