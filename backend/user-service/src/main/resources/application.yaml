spring:
  application:
    name: user-service
  # PostgreSQL
  datasource:
    url: jdbc:postgresql://localhost:5432/lifeops_db
    username: lifeops
    password: lifeops_password
    driver-class-name: org.postgresql.Driver
  # JPA
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        formate_sql: true

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8081
