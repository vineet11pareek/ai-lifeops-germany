name: Frontend CI

on:
  push:
    branches:
      - main
    paths:
      - "frontend/lifeops-ui/**"
      - ".github/workflows/frontend-ci.yml"

  pull_request:
    branches:
      - main
    paths:
      - "frontend/lifeops-ui/**"
      - ".github/workflows/frontend-ci.yml"

jobs:
  build:
    name: Build Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/lifeops-ui

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/lifeops-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Frontend
        run: npm run build
        working-directory: frontend/lifeops-ui
        env:
          VITE_GOOGLE_CLIENT_ID: dummy-client-id