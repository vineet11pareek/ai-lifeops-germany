name: User Service CI

on:
  push:
    branches:
      - main
    paths:
      - "backend/user-service/**"
      - ".github/workflows/user-service-ci.yml"

  pull_request:
    branches:
      - main
    paths:
      - "backend/user-service/**"
      - ".github/workflows/user-service-ci.yml"

jobs:
  build-and-test:
    name: Build and Test User Service
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: lifeops_db
          POSTGRES_USER: lifeops
          POSTGRES_PASSWORD: lifeops_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U lifeops -d lifeops_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: backend/user-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Make Maven Wrapper executable
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw test

      - name: Build application
        run: ./mvnw clean package -DskipTests